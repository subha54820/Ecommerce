{% extends "base.html" %}
{% block title %}Login - Secure Access{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 100vh; padding: 120px 20px 60px; background: #ffffff;">
  <div class="glass-card p-0 overflow-hidden shadow-sm" style="max-width: 450px; width: 100%; border-radius: 20px; border: 1px solid rgba(0,0,0,0.05);">
    
    <!-- Login Form -->
    <div class="auth-form-container p-5" style="background: #ffffff;">
      {% include "auth_nav.html" %}
      
      <div class="mb-5 text-center">
        <h2 class="fw-bold mb-0" style="letter-spacing: -0.5px; color: #000000;">Login</h2>
      </div>

      <form action="{% url 'handleLogin' %}" method="post" autocomplete="off">
        {% csrf_token %}
        {% if request.GET.next %}
          <input type="hidden" name="next" value="{{ request.GET.next }}">
        {% endif %}
        
        <div class="mb-4">
          <label class="form-label small fw-bold text-uppercase tracking-wider" style="color: var(--accent-color); font-size: 0.7rem;">Username</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 rounded-start-pill ps-3" style="border-color: rgba(0,0,0,0.1);"><i class="bi bi-person text-muted"></i></span>
            <input type="text" name="username" class="form-control p-3 border-start-0 rounded-end-pill" placeholder="Your Username" required style="background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.1);">
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label small fw-bold text-uppercase tracking-wider" style="color: var(--accent-color); font-size: 0.7rem;">Private Password</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 rounded-start-pill ps-3" style="border-color: rgba(0,0,0,0.1);"><i class="bi bi-lock text-muted"></i></span>
            <input type="password" name="pass" class="form-control p-3 border-start-0 rounded-end-pill" placeholder="••••••••" required style="background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.1);">
          </div>
        </div>

        <button type="submit" class="btn btn-gradient w-100 py-3 fw-bold rounded-pill shadow-lg mt-3" style="background: linear-gradient(135deg, #000 0%, #1a1a1a 100%); color: #D4AF37; border: 1px solid #D4AF37;">
          Unlock Account <i class="bi bi-chevron-right ms-2 small"></i>
        </button>

        <div class="text-center mt-5 pt-3">
          <p class="text-muted small">
            New to ShopEasy? 
            <a href="{% url 'signup' %}" class="fw-bold text-decoration-none" style="color: var(--accent-color);">Sign Up Here</a>
          </p>
        </div>
      </form>
    </div>
  </div>
</div>

<style>
  .input-group-text { border-color: var(--glass-border); }
  .form-control {
    background: var(--surface-color);
    border-color: var(--glass-border);
    color: var(--text-main);
  }
  .form-control:focus {
    box-shadow: none;
    border-color: var(--accent-color);
  }
</style>
{% endblock %}
