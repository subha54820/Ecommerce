<div class="auth-nav-container mb-4 d-flex justify-content-center">
  <div class="auth-pills d-flex p-1 bg-light rounded-pill shadow-sm" style="background: rgba(0,0,0,0.03) !important;">
    <a href="{% url 'handleLogin' %}" class="nav-pill-item px-4 py-2 rounded-pill text-decoration-none transition-all {% if request.resolver_match.url_name == 'handleLogin' %}active-pill{% endif %}" style="font-size: 0.9rem; font-weight: 600;">
      <i class="bi bi-box-arrow-in-right me-1"></i> Login
    </a>
    <a href="{% url 'signup' %}" class="nav-pill-item px-4 py-2 rounded-pill text-decoration-none transition-all {% if request.resolver_match.url_name == 'signup' %}active-pill{% endif %}" style="font-size: 0.9rem; font-weight: 600;">
      <i class="bi bi-person-plus me-1"></i> Sign Up
    </a>
    {% if user.is_authenticated %}
    <a href="{% url 'handleLogout' %}" class="nav-pill-item px-4 py-2 rounded-pill text-decoration-none transition-all" style="font-size: 0.9rem; font-weight: 600; color: #dc3545;">
      <i class="bi bi-box-arrow-right me-1"></i> Logout
    </a>
    {% endif %}
  </div>
</div>

<style>
  .nav-pill-item {
    color: #666;
    display: flex;
    align-items: center;
  }
  .nav-pill-item:hover {
    color: #000;
    background: rgba(0,0,0,0.05);
  }
  .active-pill {
    background: #000 !important;
    color: #fff !important;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  .transition-all { transition: all 0.3s ease; }
</style>
